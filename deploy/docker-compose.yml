# Lithos — Local Development Stack
# Usage: docker compose up

services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    ports:
      - "9001:9001"
    environment:
      RUST_LOG: lithos=debug
      DATABASE_URL: ${DATABASE_URL}
      CENTRAL_API_URL: http://api:3000
      CENTRAL_API_KEY: ${CENTRAL_API_KEY}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE}
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      RUST_LOG: lithos=debug
      DATABASE_URL: ${DATABASE_URL}
      CENTRAL_API_KEY: ${CENTRAL_API_KEY}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE}

  client:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.client
    ports:
      - "8080:80"
    depends_on:
      - server
      - api
