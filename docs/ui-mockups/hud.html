<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lithos — HUD Overlay Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0e1a;
  --bg-panel: #101624;
  --bg-surface: #151d30;
  --border-main: #1e2a45;
  --border-accent: #2a3a60;
  --text-primary: #e8eaed;
  --text-secondary: #7a8aa6;
  --text-dim: #4a5a70;
  --health: #dd3333;
  --health-bg: #331515;
  --oxygen: #33aaff;
  --oxygen-bg: #0a1a33;
  --ammo: #f0a000;
  --ammo-bg: #332000;
  --xp: #2ea043;
  --xp-bg: #0a1f10;
  --credits: #f0c040;
  --highlight: #58a6ff;
  --danger: #ff4422;
  --warning: #ffaa33;
  --safe: #33cc66;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-deep);
  font-family: 'Rajdhani', sans-serif;
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}

/* ——— GAME VIEWPORT BACKGROUND ——— */
#viewport {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: radial-gradient(ellipse at 30% 40%, #0f1a30 0%, #060a14 100%);
  overflow: hidden;
}
#viewport::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(26,42,85,0.06) 39px, rgba(26,42,85,0.06) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(26,42,85,0.06) 39px, rgba(26,42,85,0.06) 40px);
  pointer-events: none;
}

/* ——— HUD OVERLAY ——— */
#hud {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* Panels that need interaction toggle pointer-events */
.clickable { pointer-events: auto; }

/* ——— TOP-LEFT: VITAL SIGNS ——— */
#vitals {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 220px;
}

.vital-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(10,14,26,0.85);
  border: 1px solid var(--border-main);
  padding: 4px 10px 4px 6px;
}
.vital-icon {
  width: 20px;
  text-align: center;
  font-size: 12px;
  opacity: 0.8;
}
.vital-label {
  font-family: 'Orbitron', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--text-secondary);
  width: 36px;
}
.vital-bar-track {
  flex: 1;
  height: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border-main);
  position: relative;
  overflow: hidden;
}
.vital-bar-fill {
  height: 100%;
  transition: width 0.3s ease;
}
.vital-bar-fill.health  { background: var(--health); box-shadow: inset 0 0 6px rgba(221,51,51,0.3); }
.vital-bar-fill.oxygen  { background: var(--oxygen); box-shadow: inset 0 0 6px rgba(51,170,255,0.3); }
.vital-bar-fill.ammo    { background: var(--ammo);   box-shadow: inset 0 0 6px rgba(240,160,0,0.3); }
.vital-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  min-width: 50px;
  text-align: right;
}

/* ——— TOP-LEFT: STATUS ROW 2 ——— */
#status-row {
  position: absolute;
  top: 108px;
  left: 12px;
  display: flex;
  gap: 4px;
}
.status-chip {
  background: rgba(10,14,26,0.85);
  border: 1px solid var(--border-main);
  padding: 2px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}
.status-chip .val { color: var(--text-primary); font-weight: 700; }
.status-chip.xp .val { color: var(--xp); }
.status-chip.credits .val { color: var(--credits); }

/* ——— TOP-RIGHT: MINIMAP ——— */
#minimap {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 150px;
  height: 150px;
  background: rgba(10,14,26,0.9);
  border: 1px solid var(--border-accent);
  overflow: hidden;
}
#minimap-canvas {
  width: 100%;
  height: 100%;
}
.minimap-label {
  position: absolute;
  bottom: 2px;
  left: 4px;
  font-family: 'Orbitron', monospace;
  font-size: 7px;
  letter-spacing: 2px;
  color: var(--text-dim);
}

/* ——— BOTTOM: HOTBAR ——— */
#hotbar {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 3px;
}
.hotbar-slot {
  width: 48px;
  height: 48px;
  background: rgba(10,14,26,0.88);
  border: 1px solid var(--border-main);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-secondary);
  transition: border-color 0.15s, background 0.15s;
}
.hotbar-slot.active {
  border-color: var(--highlight);
  background: rgba(88,166,255,0.12);
  box-shadow: 0 0 8px rgba(88,166,255,0.15);
}
.hotbar-slot.has-item {
  color: var(--text-primary);
  font-weight: 700;
  font-size: 10px;
}
.hotbar-slot .slot-key {
  position: absolute;
  top: 1px;
  left: 3px;
  font-size: 7px;
  color: var(--text-dim);
  font-family: 'Orbitron', monospace;
}
.hotbar-slot .slot-amount {
  position: absolute;
  bottom: 1px;
  right: 3px;
  font-size: 8px;
  color: var(--text-secondary);
}

/* ——— BOTTOM-LEFT: INFO ——— */
#info {
  position: absolute;
  bottom: 72px;
  left: 12px;
  display: flex;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
}
#info span { color: var(--text-secondary); }

/* ——— BOTTOM-LEFT: CHAT ——— */
#chat {
  position: absolute;
  bottom: 72px;
  left: 12px;
  width: 380px;
  pointer-events: auto;
}
#chat-messages {
  background: rgba(10,14,26,0.85);
  border: 1px solid var(--border-main);
  padding: 6px 8px;
  min-height: 60px;
  max-height: 120px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.chat-msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  line-height: 1.4;
}
.chat-msg .from { color: var(--highlight); }
.chat-msg .text { color: var(--text-secondary); }
.chat-msg.system .from { color: var(--warning); }
.chat-msg.faction .from { color: var(--xp); }

#chat-input-line {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
  background: rgba(10,14,26,0.85);
  border: 1px solid var(--border-main);
  padding: 3px 6px;
}
#chat-prompt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
}
#chat-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
}

/* ——— CENTER: FLASH TEXTS ——— */
#flash-area {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -80%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  pointer-events: none;
}
.flash-text {
  font-family: 'Orbitron', monospace;
  font-size: 14px;
  font-weight: 700;
  opacity: 0;
  animation: flashUp 2.5s ease-out forwards;
}
.flash-text.xp { color: var(--xp); }
.flash-text.error { color: var(--danger); }
.flash-text.info { color: var(--highlight); }

@keyframes flashUp {
  0%   { opacity: 1; transform: translateY(0); }
  70%  { opacity: 1; }
  100% { opacity: 0; transform: translateY(-24px); }
}

/* ——— CENTER: CROSSHAIR ——— */
#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 24px;
  height: 24px;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
#crosshair::before,
#crosshair::after {
  content: '';
  position: absolute;
  background: var(--danger);
}
#crosshair::before {
  width: 2px;
  height: 100%;
  left: 50%;
  transform: translateX(-50%);
}
#crosshair::after {
  width: 100%;
  height: 2px;
  top: 50%;
  transform: translateY(-50%);
}
.crosshair-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,68,34,0.5);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

/* ——— RESPONSIVE ——— */
@media (max-width: 800px) {
  #vitals { min-width: 160px; }
  .vital-row { padding: 2px 6px; }
  .vital-bar-track { height: 8px; }
  .vital-value { font-size: 9px; min-width: 36px; }
  #hotbar { transform: translateX(-50%) scale(0.8); }
  #minimap { width: 100px; height: 100px; }
  #chat { width: 260px; }
}
</style>
</head>
<body>
<div id="viewport">

  <!-- HUD -->
  <div id="hud">

    <!-- Vitals -->
    <div id="vitals">
      <div class="vital-row">
        <span class="vital-icon">❤</span>
        <span class="vital-label">HULL</span>
        <div class="vital-bar-track">
          <div class="vital-bar-fill health" style="width: 73%"></div>
        </div>
        <span class="vital-value" style="color:var(--health)">73/100</span>
      </div>
      <div class="vital-row">
        <span class="vital-icon">◌</span>
        <span class="vital-label">O₂</span>
        <div class="vital-bar-track">
          <div class="vital-bar-fill oxygen" style="width: 88%"></div>
        </div>
        <span class="vital-value" style="color:var(--oxygen)">88/100</span>
      </div>
      <div class="vital-row">
        <span class="vital-icon">⚡</span>
        <span class="vital-label">AMMO</span>
        <div class="vital-bar-track">
          <div class="vital-bar-fill ammo" style="width: 56%"></div>
        </div>
        <span class="vital-value" style="color:var(--ammo)">28/50</span>
      </div>
    </div>

    <!-- Status Row -->
    <div id="status-row">
      <div class="status-chip xp">XP <span class="val">Extraction Lv.3</span></div>
      <div class="status-chip credits">CR <span class="val">12,450</span></div>
      <div class="status-chip">TICK <span class="val">#3842</span></div>
      <div class="status-chip">FPS <span class="val">58</span></div>
    </div>

    <!-- Minimap -->
    <div id="minimap">
      <svg id="minimap-canvas" viewBox="0 0 150 150">
        <rect width="150" height="150" fill="#0d1117"/>
        <circle cx="75" cy="75" r="1.5" fill="rgba(255,255,255,0.9)"/>
        <circle cx="90" cy="60" r="1" fill="rgba(124,58,237,0.6)"/>
        <circle cx="40" cy="95" r="2" fill="rgba(255,68,34,0.5)"/>
        <rect x="55" y="55" width="3" height="3" fill="rgba(136,136,136,0.7)"/>
        <rect x="30" y="30" width="2" height="2" fill="rgba(46,160,67,0.6)"/>
      </svg>
      <span class="minimap-label">▣ MINIMAP</span>
    </div>

    <!-- Hotbar -->
    <div id="hotbar">
      <div class="hotbar-slot active" title="Unarmed">
        <span class="slot-key">0</span>
        <span style="font-size:16px">⊘</span>
      </div>
      <div class="hotbar-slot has-item" title="Mining Laser">
        <span class="slot-key">1</span>
        <span>ML</span>
        <span class="slot-amount">1</span>
      </div>
      <div class="hotbar-slot has-item" title="Plasma Pistol">
        <span class="slot-key">2</span>
        <span>PP</span>
        <span class="slot-amount">1</span>
      </div>
      <div class="hotbar-slot has-item" title="Iron x12">
        <span class="slot-key">3</span>
        <span>FE</span>
        <span class="slot-amount">12</span>
      </div>
      <div class="hotbar-slot has-item" title="Copper x8">
        <span class="slot-key">4</span>
        <span>CU</span>
        <span class="slot-amount">8</span>
      </div>
      <div class="hotbar-slot has-item" title="Medkit x2">
        <span class="slot-key">5</span>
        <span>+</span>
        <span class="slot-amount">2</span>
      </div>
      <div class="hotbar-slot" title="Empty">
        <span class="slot-key">6</span>
      </div>
      <div class="hotbar-slot" title="Empty">
        <span class="slot-key">7</span>
      </div>
      <div class="hotbar-slot" title="Empty">
        <span class="slot-key">8</span>
      </div>
      <div class="hotbar-slot" title="Empty">
        <span class="slot-key">9</span>
      </div>
    </div>

    <!-- Info text -->
    <div id="info">
      <span>[SPACE] Warp</span>
      <span>[C] Craft</span>
      <span>[B] Build</span>
      <span>[1-9] Select</span>
    </div>

    <!-- Flash texts -->
    <div id="flash-area">
      <div class="flash-text xp" style="animation-delay: 0s">+25 Extraction XP</div>
      <div class="flash-text info" style="animation-delay: 1.5s">iron_plate crafted</div>
    </div>

    <!-- Crosshair -->
    <div id="crosshair">
      <div class="crosshair-ring"></div>
    </div>

  </div>
</div>
</body>
</html>
